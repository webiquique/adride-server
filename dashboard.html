<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Uber Ads Iquique - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-card h3 { font-size: 2.5em; color: #00d9ff; }
        .stat-card p { opacity: 0.8; margin-top: 5px; }
        .tablets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .tablet-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #00d9ff;
        }
        .tablet-card.inactive { border-left-color: #ff4757; }
        .tablet-card h3 {
            color: #00d9ff;
            margin-bottom: 15px;
            font-family: monospace;
        }
        .tablet-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 5px; }
        .info-item label { display: block; font-size: 0.8em; opacity: 0.6; margin-bottom: 3px; }
        .info-item span { font-weight: bold; }
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .status.online { background: #2ed573; color: #000; }
        .status.offline { background: #ff4757; color: #fff; }
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            background: #00d9ff;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        .last-update { text-align: center; opacity: 0.6; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Uber Ads Iquique - Dashboard</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3 id="total-tablets">0</h3>
                <p>Total Tablets</p>
            </div>
            <div class="stat-card">
                <h3 id="active-tablets">0</h3>
                <p>Activas</p>
            </div>
            <div class="stat-card">
                <h3 id="total-impressions">0</h3>
                <p>Impresiones Hoy</p>
            </div>
            <div class="stat-card">
                <h3 id="offline-tablets">0</h3>
                <p>Offline</p>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 Actualizar Datos</button>
        
        <div class="tablets-grid" id="tablets-container">
            <!-- Las tablets se cargan aquí -->
        </div>
        
        <p class="last-update">Última actualización: <span id="last-update">-</span></p>
    </div>

    <script>
        const SERVER_URL = window.location.origin;
        
        async function loadData() {
    try {
        const response = await fetch(`${SERVER_URL}/api/tablets`);
        
        // 👇 AGREGA ESTO: Verificar que la respuesta HTTP es exitosa
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 200)}`);
        }
        
        const data = await response.json();
        renderTablets(data);
        updateStats(data);
        document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        
    } catch (error) {
        console.error('❌ Error cargando datos:', error);
        
        // 👇 Muestra el error real en el dashboard para debugging
        document.getElementById('tablets-container').innerHTML = 
            `<p style="text-align:center;color:#ff4757;">
                ⚠️ Error: ${error.message.substring(0, 150)}...
                <br><small style="color:#a0a0a0;">Revisa Console (F12) para más detalles</small>
            </p>`;
    }
}
        
       function renderTablets(data) {
    const container = document.getElementById('tablets-container');
    
    if (!data || !data.tablets || Object.keys(data.tablets).length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#a0a0a0;">No hay tablets conectadas aún</p>';
        return;
    }
    
    let html = '';
    const NOW = Date.now() / 1000;  // Timestamp actual en segundos
    const OFFLINE_THRESHOLD = 600;   // 10 minutos en segundos
    
    for (const [deviceId, tablet] of Object.entries(data.tablets)) {
        // 👇 LÓGICA MEJORADA PARA DETECTAR ONLINE/OFFLINE
        const lastSeen = tablet.last_seen || 0;
        const secondsAgo = NOW - lastSeen;
        const isOnline = secondsAgo < OFFLINE_THRESHOLD;
        
        // Parsear ad_stats (viene como string JSON)
        let adStats = {};
        try {
            adStats = typeof tablet.ad_stats === 'string' 
                ? JSON.parse(tablet.ad_stats) 
                : tablet.ad_stats || {};
        } catch (e) {
            console.warn('Error parseando ad_stats:', e);
        }
        
        // Calcular total de impresiones
        const totalImpressions = Object.values(adStats).reduce((sum, ad) => 
            sum + (ad.impressions || 0), 0);
        
        // Texto para "última conexión"
        const lastSeenText = isOnline 
            ? 'Ahora' 
            : `hace ${Math.round(secondsAgo / 60)} min`;
        
        html += `
            <div class="tablet-card" style="
                background: rgba(210, 40, 169, 0.05);
                border: 1px solid rgba(210, 40, 169, ${isOnline ? '0.3' : '0.1'});
                border-radius: 10px;
                padding: 1.5rem;
                margin: 1rem 0;
                opacity: ${isOnline ? '1' : '0.7'};
            ">
                <div class="tablet-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                    <h4 style="color:#fffefe;margin:0;">📱 ${deviceId.substring(0, 12)}...</h4>
                    <span style="
                        background: ${isOnline 
                            ? 'linear-gradient(135deg, #00c853, #00e676)' 
                            : 'linear-gradient(135deg, #ff1744, #ff5252)'};
                        color: white;
                        padding: 0.25rem 0.75rem;
                        border-radius: 20px;
                        font-size: 0.8rem;
                        font-weight: bold;
                        transition: all 0.3s ease;
                    ">
                        ${isOnline ? '🟢 EN LÍNEA' : '🔴 SIN CONEXIÓN'}
                    </span>
                </div>
                
                <div class="tablet-info" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1rem;">
                    <div style="background:rgba(0,0,0,0.2);padding:0.5rem;border-radius:5px;">
                        <strong style="color:#d228a9;">Modelo:</strong><br>
                        <span style="color:#a0a0a0;">${tablet.model || 'Desconocido'}</span>
                    </div>
                    <div style="background:rgba(0,0,0,0.2);padding:0.5rem;border-radius:5px;">
                        <strong style="color:#d228a9;">Red:</strong><br>
                        <span style="color:#a0a0a0;">${tablet.network_type || 'Desconocida'}</span>
                    </div>
                    <div style="background:rgba(0,0,0,0.2);padding:0.5rem;border-radius:5px;">
                        <strong style="color:#d228a9;">Impresiones:</strong><br>
                        <span style="color:#00e676;font-weight:bold;">${totalImpressions.toLocaleString()}</span>
                    </div>
                    <div style="background:rgba(0,0,0,0.2);padding:0.5rem;border-radius:5px;">
                        <strong style="color:#d228a9;">Última conexión:</strong><br>
                        <span style="color:#a0a0a0;">${tablet.received_at || 'Nunca'} (${lastSeenText})</span>
                    </div>
                </div>
                
                ${Object.keys(adStats).length > 0 ? `
                <div class="ad-stats" style="
                    background: rgba(0, 101, 237, 0.05);
                    border: 1px solid rgba(0, 101, 237, 0.2);
                    border-radius: 5px;
                    padding: 1rem;
                ">
                    <h5 style="color:#0065ed;margin:0 0 0.5rem 0;">📊 Anuncios mostrados:</h5>
                    <ul style="list-style:none;padding:0;margin:0;">
                        ${Object.entries(adStats).map(([name, stats]) => `
                            <li style="
                                display:flex;
                                justify-content:space-between;
                                padding:0.5rem 0;
                                border-bottom:1px solid rgba(255,255,255,0.1);
                            ">
                                <span style="color:#fffefe;">${name}</span>
                                <span style="color:#00e676;font-weight:bold;">${stats.impressions} impresiones</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
                ` : ''}
            </div>
        `;
    }
    
    container.innerHTML = html;
}
        
        function updateStats(tablets) {
            const deviceIds = Object.keys(tablets);
            const now = new Date();
            
            let activeCount = 0;
            let totalImpressions = 0;
            
            deviceIds.forEach(id => {
                const tablet = tablets[id];
                const lastSeen = tablet.last_seen ? new Date(tablet.last_seen * 1000) : null;
                const minutesSinceLastSeen = lastSeen ? Math.floor((now - lastSeen) / 60000) : 999;
                
                if (minutesSinceLastSeen < 10) activeCount++;
                totalImpressions += parseInt(tablet.total_impressions || 0);
            });
            
            document.getElementById('total-tablets').textContent = deviceIds.length;
            document.getElementById('active-tablets').textContent = activeCount;
            document.getElementById('total-impressions').textContent = totalImpressions;
            document.getElementById('offline-tablets').textContent = deviceIds.length - activeCount;
        }
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
