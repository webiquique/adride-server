<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Uber Ads Iquique - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-card h3 { font-size: 2.5em; color: #00d9ff; }
        .stat-card p { opacity: 0.8; margin-top: 5px; }
        .tablets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .tablet-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #00d9ff;
        }
        .tablet-card.inactive { border-left-color: #ff4757; }
        .tablet-card h3 {
            color: #00d9ff;
            margin-bottom: 15px;
            font-family: monospace;
        }
        .tablet-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 5px; }
        .info-item label { display: block; font-size: 0.8em; opacity: 0.6; margin-bottom: 3px; }
        .info-item span { font-weight: bold; }
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .status.online { background: #2ed573; color: #000; }
        .status.offline { background: #ff4757; color: #fff; }
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            background: #00d9ff;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        .last-update { text-align: center; opacity: 0.6; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Uber Ads Iquique - Dashboard</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3 id="total-tablets">0</h3>
                <p>Total Tablets</p>
            </div>
            <div class="stat-card">
                <h3 id="active-tablets">0</h3>
                <p>Activas</p>
            </div>
            <div class="stat-card">
                <h3 id="total-impressions">0</h3>
                <p>Impresiones Hoy</p>
            </div>
            <div class="stat-card">
                <h3 id="offline-tablets">0</h3>
                <p>Offline</p>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 Actualizar Datos</button>
        
        <div class="tablets-grid" id="tablets-container">
            <!-- Las tablets se cargan aquí -->
        </div>
        
        <p class="last-update">Última actualización: <span id="last-update">-</span></p>
    </div>

    <script>
        const SERVER_URL = 'http://localhost:5000';
        
        async function loadData() {
            try {
                const response = await fetch(`${SERVER_URL}/api/tablets`);
                const data = await response.json();
                renderTablets(data);
                updateStats(data);
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error cargando datos:', error);
                document.getElementById('tablets-container').innerHTML = 
                    '<p style="text-align:center;color:#ff4757;">⚠️ Error conectando al servidor. ¿Está ejecutándose server.py?</p>';
            }
        }
        
        function renderTablets(tablets) {
            const container = document.getElementById('tablets-container');
            const deviceIds = Object.keys(tablets);
            
            if (deviceIds.length === 0) {
                container.innerHTML = '<p style="text-align:center;opacity:0.6;">⏳ Esperando datos de tablets...</p>';
                return;
            }
            
            container.innerHTML = deviceIds.map(deviceId => {
                const tablet = tablets[deviceId];
                const lastSeen = tablet.last_seen ? new Date(tablet.last_seen * 1000) : null;
                const now = new Date();
                const minutesSinceLastSeen = lastSeen ? Math.floor((now - lastSeen) / 60000) : 999;
                const isOnline = minutesSinceLastSeen < 10;
                
                return `
                    <div class="tablet-card ${isOnline ? '' : 'inactive'}">
                        <h3>📱 ${deviceId.substring(0, 16)}...</h3>
                        <p style="margin-bottom:15px;">
                            <span class="status ${isOnline ? 'online' : 'offline'}">
                                ${isOnline ? '🟢 EN LÍNEA' : '🔴 OFFLINE'}
                            </span>
                        </p>
                        <div class="tablet-info">
                            <div class="info-item">
                                <label>Modelo</label>
                                <span>${tablet.model || 'N/A'}</span>
                            </div>
                            <div class="info-item">
                                <label>Android</label>
                                <span>${tablet.android_version || 'N/A'}</span>
                            </div>
                            <div class="info-item">
                                <label>Impresiones</label>
                                <span>${tablet.total_impressions || 0}</span>
                            </div>
                            <div class="info-item">
                                <label>Anuncio Actual</label>
                                <span>#${parseInt(tablet.current_ad_index || 0) + 1}</span>
                            </div>
                            <div class="info-item">
                                <label>Red</label>
                                <span>${tablet.network_type || 'N/A'}</span>
                            </div>
                            <div class="info-item">
                                <label>Batería</label>
                                <span>${tablet.is_charging === 'true' ? '🔌 Cargando' : '🔋 Usando batería'}</span>
                            </div>
                            <div class="info-item">
                                <label>Último Ping</label>
                                <span>${minutesSinceLastSeen} min atrás</span>
                            </div>
                            <div class="info-item">
                                <label>Recibido</label>
                                <span>${tablet.received_at || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function updateStats(tablets) {
            const deviceIds = Object.keys(tablets);
            const now = new Date();
            
            let activeCount = 0;
            let totalImpressions = 0;
            
            deviceIds.forEach(id => {
                const tablet = tablets[id];
                const lastSeen = tablet.last_seen ? new Date(tablet.last_seen * 1000) : null;
                const minutesSinceLastSeen = lastSeen ? Math.floor((now - lastSeen) / 60000) : 999;
                
                if (minutesSinceLastSeen < 10) activeCount++;
                totalImpressions += parseInt(tablet.total_impressions || 0);
            });
            
            document.getElementById('total-tablets').textContent = deviceIds.length;
            document.getElementById('active-tablets').textContent = activeCount;
            document.getElementById('total-impressions').textContent = totalImpressions;
            document.getElementById('offline-tablets').textContent = deviceIds.length - activeCount;
        }
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
