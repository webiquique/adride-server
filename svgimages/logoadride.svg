<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">

  <defs>
    <linearGradient id="gradPin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2ea6"/>
      <stop offset="50%" stop-color="#7b3fe4"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>

    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3ecbff"/>
      <stop offset="100%" stop-color="#007bff"/>
    </linearGradient>
  </defs>

  <!-- Fondo opcional -->
  <rect width="100%" height="100%" fill="#020c1b"/>

  <!-- Pin ubicación -->
  <path d="
  M120 40
  C70 40 40 80 40 120
  C40 200 120 250 120 250
  C120 250 200 200 200 120
  C200 80 170 40 120 40 Z"
  fill="url(#gradPin)"/>

  <!-- Pantalla -->
  <rect x="85" y="95" width="70" height="45" rx="8"
        fill="#0c0c0c" stroke="#1fd1ff" stroke-width="3"/>

  <!-- Play -->
  <polygon points="110,105 110,130 135,118"
           fill="white"/>

  <!-- Texto -->
  <text x="260" y="150"
        font-family="Arial, Helvetica, sans-serif"
        font-size="80"
        font-weight="bold"
        fill="white">
        Ad<tspan fill="url(#gradText)">Ride</tspan>
  </text>

</svg>

